# Fly.io config for the Avareno API (FastAPI + SQLite on a persistent volume).
# Deploy from repo root: fly deploy
app = "avareno-api"
primary_region = "fra"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"
  AVARENO_REQUIRE_AUTH = "1"
  AVARENO_APP_URL = "https://avareno.app"
  AVARENO_ENABLE_STATIC_UPLOADS = "false"
  AVARENO_CORS_ORIGINS = "https://avareno.app,https://www.avareno.app"
  STRIPE_CHECKOUT_LOCALE = "de"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # SQLite on a single volume -> exactly one machine. Never scale this up
  # while the database is file-based.
  min_machines_running = 0

[[mounts]]
  source = "avareno_data"
  destination = "/data"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
